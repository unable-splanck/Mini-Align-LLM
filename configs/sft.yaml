seed: 42
model:
  name_or_path: distilgpt2
  trust_remote_code: false
  use_fp16: false

data:
  train_file: data/processed/sft_train.jsonl
  validation_file: data/processed/sft_val.jsonl
  max_length: 512
  prompt_template: |
    ### Instruction:
    {instruction}

    ### Input:
    {input}

    ### Response:

training:
  output_dir: checkpoints/sft
  per_device_train_batch_size: 2
  per_device_eval_batch_size: 2
  gradient_accumulation_steps: 4
  learning_rate: 5.0e-5
  num_train_epochs: 1
  weight_decay: 0.01
  warmup_ratio: 0.03
  logging_steps: 5
  save_strategy: epoch
  evaluation_strategy: epoch
  max_grad_norm: 1.0

